ish</a></div></div></div><nav class="ed-element ed-menu wv-custom hide-lg hide-md" id="ed-855604975"><ul class="menu-level-0"><li class="wv-page-16062895-en first"><a href="/en/about" class="wv-page-16062895-en first">About</a></li><li class="wv-page-16062898-en"><a href="/en/services" class="wv-page-16062898-en">Services</a></li><li class="wv-page-16062901-en"><a href="/en/price" class="wv-page-16062901-en">Price</a></li><li class="wv-page-16062907-id"><a href="/id/faq" class="wv-page-16062907-id">FAQ</a></li><li class="wv-page-16062904-en"><a href="/en/contact-us" class="wv-page-16062904-en">Contact Us</a></li><li class="wv-page-16189975-en end active"><a href="/en/register" class="wv-page-16189975-en last active">Register</a></li></ul></nav></div></div><div class="ed-element ed-container wv-boxed wv-spacer" id="ed-843396742"><div class="inner"><div class="ed-element ed-html" id="ed-843447896"><!-- Form Register Modern -->
<div style="display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f5f7fa;">
  <div style="background:#fff;padding:30px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.1);width:100%;max-width:400px;">
    <h3 style="text-align:center;color:#0056b3;margin-bottom:20px;">Register</h3>
    
    <label style="display:block;margin-bottom:5px;font#ed-843406953-weight:bold;color:#333;">Full Name</label>
    <input id="name" type="name" placeholder="Your Name" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;margin-bottom:15px;">
    
    <label style="display:block;margin-bottom:5px;font#ed-843406953-weight:bold;color:#333;">Email</label>
    <input id="email" type="email" placeholder="example@yourmail.com" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;margin-bottom:15px;">

    <label style="display:block;margin-bottom:5px;font-weight:bold;color:#333;">Password</label>
    <input id="password" type="password" placeholder="Minimum 6 characters" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;margin-bottom:15px;">

    <label style="display:block;margin-bottom:5px;font-weight:bold;color:#333;">Phone Number</label>
    <input id="phone" type="tel" placeholder="Ex: 08123456789" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;margin-bottom:15px;">

    <label style="display:block;margin-bottom:5px;font-weight:bold;color:#333;">Company Name</label>
    <input id="company" type="text" placeholder="Company" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;margin-bottom:20px;">

    <button id="registerBtn" style="width:100%;padding:12px;background:#0056b3;color:white;border:none;border-radius:6px;font-size:16px;cursor:pointer;transition:background 0.3s ease;">
      Register
    </button>

    <p id="error" style="color:red;font-size:14px;margin-top:10px;"></p>
  </div>
</div>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

  // Konfigurasi Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyDwxASMHa85LAV01rScMgbCxqEQ1FdKXdI",
    authDomain: "petalytix.firebaseapp.com",
    projectId: "petalytix",
    storageBucket: "petalytix.firebasestorage.app",
    messagingSenderId: "676653270164",
    appId: "1:676653270164:web:d5ae00e4c6938b661ce081"
  };

  // Inisialisasi Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Event klik tombol daftar
  document.getElementById("registerBtn").addEventListener("click", async () => {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const company = document.getElementById("company").value.trim();
    const errorMsg = document.getElementById("error");

    errorMsg.innerText = "";

    if (!name || !email || !password || !phone || !company) {
      errorMsg.innerText = "All fields must be filled.";
      return;
    }

    try {
      // Buat akun di Firebase Auth
      console.log("📌 Try to create account...");
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;
      console.log("✅ Akun berhasil dibuat:", user.uid);

      // Kirim email verifikasi
      await sendEmailVerification(user);
      console.log("📩 Email verifikasi terkirim ke:", email);

      // Simpan data tambahan ke Firestore
      console.log("📌 Storing data...");
      await setDoc(doc(db, "users", user.uid), {
         name: name,
         email: email,
         phone: phone,
         company: company,
         dashboardLink: "https://lookerstudio.google.com/embed/reporting/7c9f350b-6c47-449b-900a-0d63a1831fe1/page/p_oqk0k5zcvd",
         createdAt: new Date().toISOString(),
         emailVerified: false
      });

     console.log("✅ Data berhasil disimpan");

     alert("Success! Check email for verification before login...");
     window.location.href = `/en/login`;
    } catch (error) {
      console.error("❌ Terjadi error:", error);
      errorMsg.innerText = error.message;
    }
  });
</script>
